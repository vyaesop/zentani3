<aside class="spring-directory-sidebar">
    <form action="{% url 'store:search' %}" method="GET" class="spring-directory-search">
        <input type="text" name="q" class="form-control" placeholder="Search products" value="{{ request.GET.q|default:'' }}" required>
        <button type="submit" class="btn btn-dark">Search</button>
    </form>

    <div class="spring-directory-links">
        <h3>Collections</h3>
        <ul>
            {% for cat_menu in categories_menu %}
            <li><a href="{% url 'store:category-products' cat_menu.slug %}">{{ cat_menu.title }}</a></li>
            {% empty %}
            <li><span>No collections available.</span></li>
            {% endfor %}
        </ul>
    </div>

    <div class="spring-directory-links">
        <h3>Brands</h3>
        <ul>
            {% for brand_link in brands_menu %}
            <li><a href="{% url 'store:brand-products' brand_link.slug %}">{{ brand_link.title }}</a></li>
            {% empty %}
            <li><span>No brands available.</span></li>
            {% endfor %}
        </ul>
    </div>
</aside>
