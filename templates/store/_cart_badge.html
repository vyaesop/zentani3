{# Out-of-band swaps: refresh the nav cart badges after any cart mutation. #}
<span class="spring-cart-count" id="cart-count-desktop" hx-swap-oob="true">{{ cart_items_count }}</span>
<span class="spring-cart-count" id="cart-count-mobile" hx-swap-oob="true">{{ cart_items_count }}</span>
<span class="spring-bottom-nav__badge {% if not cart_items_count %}is-zero{% endif %}" id="cart-count-bottomnav" hx-swap-oob="true">{{ cart_items_count }}</span>
