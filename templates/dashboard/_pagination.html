{% if page_obj.has_other_pages %}
<nav class="zd-pagination" aria-label="{{ aria_label|default:'Pages' }}">
  <a class="{% if not page_obj.has_previous %}is-disabled{% endif %}"
     {% if page_obj.has_previous %}href="{{ query_string_without_page }}{% if query_string_without_page %}&{% else %}?{% endif %}page={{ page_obj.previous_page_number }}"{% endif %}
     aria-label="Previous page">
    ←
  </a>

  <div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:center">
    {% for p in page_numbers %}
      {% if p == '…' or p == '...' %}
      <span class="is-disabled">&hellip;</span>
      {% elif p == page_obj.number %}
      <span class="is-active">{{ p }}</span>
      {% else %}
      <a href="{{ query_string_without_page }}{% if query_string_without_page %}&{% else %}?{% endif %}page={{ p }}">{{ p }}</a>
      {% endif %}
    {% endfor %}
  </div>

  <a class="{% if not page_obj.has_next %}is-disabled{% endif %}"
     {% if page_obj.has_next %}href="{{ query_string_without_page }}{% if query_string_without_page %}&{% else %}?{% endif %}page={{ page_obj.next_page_number }}"{% endif %}
     aria-label="Next page">
    →
  </a>
</nav>
{% endif %}
